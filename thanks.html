  <style id="crit">:root{--white:#FFFFFF;--off-white:#FDFBF8;--gray:#F6F3EE;--gray-deep:#EDE8DF;--oak:#C9A96E;--oak-soft:#E5D0AD;--oak-deep:#9E7848;--brand:#6B4F3A;--brand-deep:#573F2D;--text:#2E2A26;--text-sub:#6B6560;--text-light:#9E9994;--border:#E8E1D7;--border-lt:#F0EBE3;--shadow-xs:0 2px 8px rgba(46,42,38,.05);--shadow-sm:0 4px 16px rgba(46,42,38,.07);--shadow-md:0 12px 36px rgba(46,42,38,.10);--shadow-lg:0 24px 56px rgba(46,42,38,.14);--radius-sm:10px;--radius:16px;--radius-lg:24px;--radius-xl:32px;--nav-h:80px;--section-py:96px;--ease:cubic-bezier(.22,.61,.36,1);--ease-in:cubic-bezier(.4,0,1,1);--ease-out:cubic-bezier(0,0,.2,1);--dur:.32s}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{font-size:16px;scroll-behavior:smooth;-webkit-text-size-adjust:100%}body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei','Heiti TC',Arial,sans-serif;background:var(--white);color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}h1,h2,h3,h4{font-family:'Noto Serif TC','PingFang TC','Microsoft JhengHei','Heiti TC',Arial,sans-serif;line-height:1.3;letter-spacing:.02em;color:var(--text)}a{text-decoration:none;color:inherit}img{display:block;max-width:100%}ul{list-style:none}button{cursor:pointer;font-family:inherit;border:none;background:none}.container{max-width:1160px;margin:0 auto;padding:0 28px}.section{padding:var(--section-py) 0}.section-sm{padding:calc(var(--section-py)*.65) 0}.text-center{text-align:center}.eyebrow{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--oak-deep);margin-bottom:10px}.section-title{font-size:clamp(1.85rem,3vw,2.75rem);margin-bottom:14px;color:var(--brand)}.section-title::after{content:'';display:block;width:52px;height:2px;background:linear-gradient(90deg,var(--oak),transparent);margin-top:14px}.text-center .section-title::after{margin-left:auto;margin-right:auto}.section-lead{font-size:1  solid var(--border);padding:16px 28px 28px;box-shadow:0 16px 32px rgba(46,42,38,.08);animation:slideDown .24s ease}.mobile-menu.open{display:block}@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}.mobile-menu ul{display:flex;flex-direction:column;gap:0}.mobile-menu a{display:block;padding:13px 0;font-size:.97rem;font-weight:600;color:var(--text);border-bottom:1px solid var(--border-lt);transition:color var(--dur)}.mobile-menu a:hover{color:var(--brand)}.mobile-cta{margin-top:16px}.mobile-cta a{display:flex;justify-content:center;padding:13px 20px;border-radius:999px;background:var(--brand);color:#fff;font-weight:700;letter-spacing:.05em}#scrollTop{position:fixed;right:22px;bottom:22px;width:46px;height:46px;border-radius:50%;background:var(--brand);color:#fff;font-size:.9rem;font-weight:700;box-shadow:0 8px 22px rgba(107,79,58,.3);opacity:0;pointer-events:none;z-index:200;transition:opacity var(--dur),transform var(--dur)}#scrollTop.show{opacity:1;pointer-events:auto}#scrollTop:hover{transform:translateY(-3px)}.page-hero{position:relative;overflow:hidden;background:linear-gradient(180deg,#f8f4ee 0%,#fff 100%);padding:calc(var(--nav-h) + 72px) 0 92px}.page-hero-bg{position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(190,160,127,.16),transparent 34%),linear-gradient(135deg,rgba(255,255,255,.32),transparent 56%)}.page-hero-inner{position:relative;z-index:1;max-width:760px}.page-hero-breadcrumb{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:.84rem;color:var(--text-light);margin-bottom:20px}.page-hero-breadcrumb a{color:var(--text-sub);transition:color var(--dur)}.page-hero-breadcrumb a:hover{color:var(--brand)}.page-hero-breadcrumb .sep{color:var(--border)}.page-hero h1{font-size:clamp(34px,4vw,46px);color:#7a5737;line-height:1.28;letter-spacing:.04em;margin:16px 0}.page-hero p{color:rgba(111,83,58,.88);max-width:640px;font-size:clamp(16px,1.7vw,18px);line-height:1.85;margin:0 0 28px}.page-hero .eyebrow{color:#b08a5a}@media(max-width:768px){:root{--nav-h:72px;--section-py:68px}.container{padding:0 20px}.nav-links,.nav-cta{display:none}.hamburger{display:flex}.page-hero{padding:calc(var(--nav-h) + 40px) 0 60px}}</style>

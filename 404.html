<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>找不到頁面｜日日好日商務中心</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/style.css"/>
<style>
.err-wrap{min-height:100svh;display:flex;align-items:center;justify-content:center;background:var(--gray,#F6F3EE);}
.err-box{text-align:center;padding:48px 28px;max-width:520px;}
.err-num{font-family:'Noto Serif TC',serif;font-size:clamp(5rem,18vw,9rem);color:var(--oak,#C9A96E);line-height:1;margin-bottom:8px;}
.err-title{font-family:'Noto Serif TC',serif;font-size:clamp(1.4rem,3vw,2rem);color:var(--brand,#6B4F3A);margin-bottom:14px;}
.err-desc{color:var(--text-sub,#6B6560);font-size:1rem;line-height:1.85;margin-bottom:32px;}
.err-actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.err-logo{margin:0 auto 32px;display:flex;align-items:center;justify-content:center;gap:10px;}
.err-logo img{width:48px;height:48px;border-radius:50%;}
.err-logo-text{font-family:'Noto Serif TC',serif;font-size:.95rem;color:var(--brand,#6B4F3A);font-weight:700;}
</style>
</head>
<body>
<div class="err-wrap">
  <div class="err-box">
    <div class="err-logo">
      <img src="images/logo.webp" alt="日日好日商務中心"/ width="500" height="500"/>
      <span class="err-logo-text">日日好日商務中心</span>
    </div>
    <div class="err-num">404</div>
    <h1 class="err-title">找不到這個頁面</h1>
    <p class="err-desc">您訪問的頁面可能已移動或不存在。<br/>請回到首頁，或透過導覽選單繼續瀏覽。</p>
    <div class="err-actions">
      <a href="/index.html" class="btn btn-primary">回到首頁</a>
      <a href="/contact.html" class="btn btn-outline-dark">聯絡我們</a>
    </div>
  </div>
</div>
</body>
</html>
